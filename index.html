<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廣慈托嬰中心 給藥核對系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei",微軟正黑體,sans-serif;background:#f0f4f8;min-height:100vh;font-size:14px;color:#1a2332}
button,input,select,textarea{font-family:inherit}
#hdr{background:#1A4B7C;color:#fff;padding:12px 18px 0}
#hdr-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px}
#hdr-title{font-size:17px;font-weight:500;letter-spacing:.5px}
#hdr-date{font-size:12px;opacity:.75;margin-top:2px}
#hdr-stat{background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;font-size:12px;flex-shrink:0}
#tabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.2)}
.tab-btn{padding:7px 14px;border:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:13px;font-weight:500}
.tab-btn.active{background:#f0f4f8;color:#1A4B7C}
.tab-btn:not(.active){background:rgba(255,255,255,.12);color:#fff}
#body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;max-width:1100px}
.card{background:#fff;border-radius:12px;border:.5px solid rgba(0,0,0,.1);padding:14px 16px}
.sec-h{font-size:14px;font-weight:500;color:#1A4B7C;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn:hover{opacity:.85}
.btn-blue{background:#2E75B6;color:#fff}
.btn-green{background:#15803d;color:#fff}
.btn-ghost{background:transparent;border:.5px solid rgba(0,0,0,.2);color:#6B7280}
.btn-sm{padding:4px 10px;font-size:12px}
.inp{width:100%;padding:6px 10px;border-radius:8px;border:.5px solid rgba(0,0,0,.2);background:#fff;font-size:13px;color:#1a2332;outline:none}
.inp:focus{border-color:#2E75B6;box-shadow:0 0 0 2px rgba(46,117,182,.15)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-blue{background:#E8F1FB;color:#2E75B6}
.b-green{background:#E8F5EE;color:#15803d}
.b-amber{background:#FEF3C7;color:#B45309}
.b-red{background:#FEE2E2;color:#991B1B}
.b-gray{background:#F3F4F6;color:#6B7280}
.b-teal{background:#F0FDF4;color:#16a34a}
.b-purple{background:#F5F3FF;color:#7C3AED}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.col-l{font-size:12px;color:#6B7280;margin-bottom:3px}
.cls-btn{padding:4px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.cls-btn.on{background:#1A4B7C;color:#fff}
.cls-btn:not(.on){background:#e5e7eb;color:#6B7280}
.stu-btn{padding:8px 14px;border-radius:8px;cursor:pointer;border:1.5px solid rgba(0,0,0,.15);background:#fff;display:flex;flex-direction:column;align-items:center;gap:2px}
.stu-btn:hover{border-color:#2E75B6}
.stu-btn.sel{background:#E8F1FB;border-color:#2E75B6}
.stu-btn.has{background:#E8F5EE;border-color:#86efac}
.entry-card{background:#fff;border-radius:12px;border:.5px solid rgba(0,0,0,.1);padding:12px 14px;border-left:3px solid #9CA3AF}
.entry-card.done{border-left-color:#15803d}
.entry-card.prog{border-left-color:#B45309}
.read-row{display:flex;gap:6px;flex-wrap:wrap;padding-top:8px;border-top:.5px solid rgba(0,0,0,.08)}
.rs{flex:1 1 110px;min-width:100px;padding:7px 9px;border-radius:8px;display:flex;flex-direction:column;gap:4px}
.rs.done{background:#E8F5EE;border:.5px solid #86efac}
.rs.todo{background:#F3F4F6;border:.5px solid rgba(0,0,0,.1)}
.rs.off{background:#F9FAFB;border:.5px solid rgba(0,0,0,.08);opacity:.5}
.mk{width:100%;padding:3px 7px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:500}
.mk-y{background:#15803d;color:#fff}
.mk-n{background:transparent;border:.5px solid rgba(0,0,0,.2)!important;color:#6B7280}
.mk-n:hover:not(:disabled){background:#f0f4f8}
.ptable{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.ptable th{background:#1A4B7C;color:#fff;padding:5px 6px;font-weight:500;white-space:nowrap}
.ptable td{padding:4px 6px;border:.5px solid rgba(0,0,0,.1);vertical-align:middle}
.ptable tr:nth-child(odd){background:#f9fafb}
.ptable tr.rdone{background:#E8F5EE}
.sb-msg{padding:6px 10px;border-radius:8px;font-size:12px;margin-top:8px;white-space:pre-line}
.sb-ok{background:#E8F5EE;color:#15803d}
.sb-err{background:#FEE2E2;color:#991B1B}
.sb-info{background:#FEF3C7;color:#B45309}
.course-card{border:.5px solid rgba(0,0,0,.1);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.course-card.active{border-color:#2E75B6;background:#F8FBFF}
.course-card.expiring{border-color:#B45309;background:#FFFBEB}
.course-card.expired{border-color:#D1D5DB;background:#F9FAFB;opacity:.65}
</style>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function normCls(s){
  if(!s)return"IC1";
  var u=String(s).trim().toUpperCase().replace(/[\s\-]/g,"");
  if(u==="IC1")return"IC1"; if(u==="IC2")return"IC2"; if(u==="NIDO")return"NIDO";
  return String(s).trim();
}
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDate(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;}
function addDays(dateStr,n){var d=new Date(dateStr);d.setDate(d.getDate()+n);return fmtDate(d);}
function isWeekday(dateStr){var w=new Date(dateStr).getDay();return w>=1&&w<=5;}
function isHoliday(dateStr){return HOLIDAYS.indexOf(dateStr)>=0;}
function isSchoolDay(dateStr){return isWeekday(dateStr)&&!isHoliday(dateStr);}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/(1000*86400));}
function rocDateStr(dateStr){
  var d=new Date(dateStr);
  return"民國"+(d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
}

// ── 療程核心邏輯 ─────────────────────────────────────────────────────────────
// visitDate: 看診日 "YYYY-MM-DD"
// days: 醫囑天數（整數）
// returns { start, end, schoolDays[] }
function calcCourse(visitDate, days){
  var start=addDays(visitDate,1); // 看診隔日起算
  var schoolDays=[];
  for(var i=0;i<days;i++){
    var d=addDays(visitDate,1+i);
    if(isSchoolDay(d))schoolDays.push(d);
  }
  var end=addDays(visitDate,days);
  return{start:start,end:end,schoolDays:schoolDays};
}

// 今天是否需給藥
function isCourseActiveToday(course){
  if(!isSchoolDay(TODAY))return false;
  var calc=calcCourse(course.visitDate,course.days);
  return calc.schoolDays.indexOf(TODAY)>=0;
}

// 療程狀態
function courseStatus(course){
  var calc=calcCourse(course.visitDate,course.days);
  var end=calc.end;
  var given=course.givenDates||[];
  var remaining=calc.schoolDays.filter(function(d){return d>=TODAY&&given.indexOf(d)<0;}).length;
  var expired=TODAY>end;
  var activeToday=calc.schoolDays.indexOf(TODAY)>=0&&!isHoliday(TODAY)&&isWeekday(TODAY);
  var givenToday=given.indexOf(TODAY)>=0;
  return{calc:calc,remaining:remaining,expired:expired,activeToday:activeToday,givenToday:givenToday,end:end};
}

        gh+='醫囑 <strong>'+c.days+' 天</strong>　';
        gh+='有效期：<strong>'+rocDateStr(st.calc.start)+'</strong> ～ <strong>'+rocDateStr(st.end)+'</strong><br>';
        gh+='在校給藥日：'+st.calc.schoolDays.map(function(d){
          var given=(c.givenDates||[]).indexOf(d)>=0;
          var isT=d===TODAY;
          return'<span style="display:inline-block;padding:1px 6px;border-radius:10px;margin:1px;font-size:11px;background:'+(given?'#E8F5EE':isT?'#EEF2FF':'#F3F4F6')+';color:'+(given?'#15803d':isT?'#7C3AED':'#6B7280')+'">'+(given?'✓ ':isT?'▶ ':'')+rocDateStr(d)+'</span>';
        }).join("");
        if(!st.calc.schoolDays.length)gh+='<span style="color:#991B1B;font-size:11px">（無上課日，全為假日/週末）</span>';
        gh+='</div></div>';
        gh+='<div style="display:flex;gap:6px;align-items:flex-start;flex-shrink:0;flex-wrap:wrap">';
        if(st.activeToday&&!st.givenToday)gh+='<button class="btn btn-blue btn-sm" onclick="addCourseToday(\''+c.id+'\')">＋ 加入今日</button>';
        if(st.givenToday)gh+='<span class="badge b-green" style="padding:4px 8px">✓ 今日已給</span>';
        if(!st.expired)gh+='<span class="badge '+(st.remaining<=1?'b-amber':'b-purple')+'" style="padding:4px 8px">剩 '+st.remaining+' 日</span>';
        else gh+='<span class="badge b-gray" style="padding:4px 8px">已結束</span>';
        gh+='<button class="btn btn-ghost btn-sm" onclick="printCourseLabel(\''+c.id+'\')" >🏷 標籤</button>';
        gh+='<button class="btn btn-ghost btn-sm" onclick="delCourse(\''+c.id+'\')" >刪除</button>';
        gh+='</div></div></div>';
      });
      return gh;
    }
    if(active.length||expiring.length){
      h+='<div class="card">';
      h+=renderGroup(expiring,"⚠️ 即將結束（剩1個上課日）","#B45309");
      h+=renderGroup(active,"✅ 進行中","#15803d");
      h+='</div>';
    }
    if(expired.length){
      h+='<div class="card" style="opacity:.7">';
      h+=renderGroup(expired,"已結束的療程","#9CA3AF");
      h+='<div style="text-align:right;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="clearExpiredCourses()">清除所有已結束療程</button></div>';
      h+='</div>';
    }
  }
  return h;
}

  h+='<span style="color:#6B7280;font-size:13px">共 '+entries.length+' 筆　已完成三讀：'+done+' 筆</span></div>';
  if(!entries.length){h+='<div style="text-align:center;padding:30px 0;color:#6B7280">今日尚無給藥記錄</div>';}
  else{
    h+='<div class="card" style="overflow-x:auto"><div class="sec-h">📄 今日清單預覽</div>';
    h+='<table class="ptable"><thead><tr>';
    ["序","姓名","班別","藥品","劑量","時間","途徑","讀1","讀2","備藥護理師","讀3","餵藥護理師","備註"].forEach(function(t){h+='<th>'+t+'</th>';});
    h+='</tr></thead><tbody>';
    entries.forEach(function(e,i){
      var mn=e.medName||(e.hasPowder&&e.hasTopical?"藥粉+外用":e.hasPowder?"僅藥粉":e.hasTopical?"僅外用":"");
      var slotL=e.slots.map(function(k){var s=SLOTS.find(function(x){return x.k===k;});return s?s.l:k;}).join("、");
      h+='<tr class="'+(e.r1&&e.r2&&e.r3?'rdone':'')+'">';
      h+='<td style="text-align:center">'+(i+1)+'</td><td style="font-weight:500;white-space:nowrap">'+e.studentName+'</td><td style="text-align:center">'+e.cls+'</td>';
      h+='<td style="white-space:nowrap">'+mn+'</td><td style="text-align:center">'+(e.medName?e.dose+e.unit:"—")+'</td>';
      h+='<td style="text-align:center;white-space:nowrap">'+slotL+'</td><td style="text-align:center">'+e.route+'</td>';
      h+='<td style="text-align:center;color:'+(e.r1?'#15803d':'#9CA3AF')+'">'+(e.r1?'✓':'○')+'</td>';
      h+='<td style="text-align:center;color:'+(e.r2?'#15803d':'#9CA3AF')+'">'+(e.r2?'✓':'○')+'</td>';
      h+='<td style="font-size:11px">'+(e.prepSign||'')+'</td>';
      h+='<td style="text-align:center;color:'+(e.r3?'#15803d':'#9CA3AF')+'">'+(e.r3?'✓':'○')+'</td>';
      h+='<td style="font-size:11px">'+(e.giveSign||'')+'</td>';
      h+='<td style="font-size:11px;white-space:nowrap">'+(e.cold?'❄ ':'')+e.note+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  return h;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var h="";
  try{
    if(curTab==="today")h=renderToday();
    else if(curTab==="course")h=renderCourse();
    else if(curTab==="long")h=renderLong();
    else if(curTab==="qr")h=renderQR();
    else if(curTab==="settings")h=renderSettings();
    else if(curTab==="print")h=renderPrint();
  }catch(err){
    h='<div style="padding:20px;color:#991B1B;background:#FEE2E2;border-radius:8px;margin:16px">⚠ 畫面錯誤：'+escH(err.message)+'<br><small>請按F12查看詳細資訊</small></div>';
    console.error(err);
  }
  document.getElementById("body").innerHTML=h;
  updateHdr();
  if(curTab==="qr")setTimeout(initQR,50);
}

function renderCard(e){
  var done=e.r1&&e.r2&&e.r3;
  var mn=e.medName||(e.hasPowder&&e.hasTopical?"（藥粉+外用）":e.hasPowder?"（僅藥粉）":e.hasTopical?"（僅外用）":"");
  var slotL=e.slots.map(function(k){var s=SLOTS.find(function(x){return x.k===k;});return s?s.l:k;}).join("、");
  var h='<div class="entry-card'+(done?" done":e.r1?" prog":"")+'">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;flex-wrap:wrap;gap:4px">';
  h+='<div class="row" style="gap:5px;align-items:center">';
  h+='<span style="font-weight:500;font-size:14px">'+e.studentName+'</span>';
  h+='<span class="badge b-blue">'+e.cls+'</span>';
  h+='<span style="font-weight:500;color:#1A4B7C">'+mn+'</span>';
  if(e.medName&&e.dose)h+='<span style="color:#6B7280">'+e.dose+e.unit+'</span>';
  h+='<span class="badge b-gray">'+slotL+'</span>';
  h+='<span style="font-size:12px;color:#6B7280">'+e.route+'</span>';
  if(e.cold)h+='<span class="badge b-amber">❄ 冷藏</span>';
  if(e.hasPowder)h+='<span class="badge b-gray">🧂'+(e.powderNote?' '+e.powderNote:'')+'</span>';
  if(e.hasTopical)h+='<span class="badge b-teal">🧴'+(e.topicalNote?' '+e.topicalNote:'')+'</span>';
  if(e.note)h+='<span style="font-size:11px;color:#6B7280">'+e.note+'</span>';
  h+='</div>';
  h+='<div style="display:flex;gap:5px;align-items:center">';
  h+='<span class="badge '+(done?'b-green':e.r1?'b-amber':'b-gray')+'">'+(done?'✓ 完成':e.r1?'進行中':'待核對')+'</span>';
  h+='<button class="btn btn-ghost btn-sm" onclick="delEntry(\''+e.id+'\')">🗑</button></div></div>';
  if(!done){
    h+='<div style="margin-bottom:8px">';
    h+='<button class="btn btn-blue" style="width:100%" onclick="openConfirm(\''+e.id+'\')">⚡ 一鍵完成三讀五對核對</button>';
    h+='</div>';
  }
  h+='<div class="read-row">';
  h+=renderStep(1,"取出藥袋",e.r1,false,e.id,null,null,null);
  h+='<div style="display:flex;align-items:center;color:#ccc;font-size:18px">›</div>';
  h+=renderStep(2,"備藥核對",e.r2,!e.r1,e.id,"prepSign",e.prepSign,"備藥護理師");
  h+='<div style="display:flex;align-items:center;color:#ccc;font-size:18px">›</div>';
  h+=renderStep(3,"給藥前確認",e.r3,!e.r2,e.id,"giveSign",e.giveSign,"餵藥護理師");
  h+='</div></div>';
  return h;
}
function renderStep(n,lbl,done,off,eid,sf,sv,slbl){
  var ns=["一","二","三"];
  var c=off?"off":done?"done":"todo";
  var h='<div class="rs '+c+'">';
  h+='<div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:500;color:'+(done?'#15803d':'#6B7280')+'">第'+ns[n-1]+'讀</span><span style="font-size:10px;color:#6B7280">'+lbl+'</span></div>';
  if(done){h+='<button class="mk mk-y" onclick="unmark(\''+eid+'\',\'r'+n+'\')">✓ 已核對</button>';}
  else{h+='<button class="mk mk-n"'+(off?' disabled':'')+' onclick="mark(\''+eid+'\',\'r'+n+'\')">☐ 核對確認</button>';}
  if(sf&&done)h+='<input class="inp" style="font-size:11px;padding:3px 6px;margin-top:3px" placeholder="'+slbl+'" value="'+escH(sv||'')+'" oninput="updSign(\''+eid+'\',\''+sf+'\',this.value)">';
  h+='</div>';
  return h;
}

function setFilter(c){clsFilter=c;render();}
function toggleStu(id){selStuId=(selStuId===id)?null:id;resetForm();render();}
function pickMed(id,def,unit){fMedId=id;fDose=String(def);fUnit=unit;render();}
function toggleSlot(k){var i=fSlots.indexOf(k);if(i>=0)fSlots.splice(i,1);else fSlots.push(k);render();}

function submitEntry(stuId){
  var stu=students.find(function(s){return s.id===stuId;});if(!stu)return;
  if(!fSlots.length){alert("請選擇給藥時間");return;}
  var mn=fMedId==="custom"?fCustom.trim():(meds.find(function(m){return m.id===fMedId;})||{name:""}).name;
  if(!mn&&!fPowder&&!fTopical){alert("請選擇藥品，或勾選含藥粉／外用");return;}
  entries.push({id:uid(),studentId:stu.id,studentName:stu.name,cls:stu.cls,
    medId:fMedId,medName:mn,dose:parseFloat(fDose)||0,unit:fUnit,slots:fSlots.slice(),route:fRoute,
    cold:fCold,note:fNote,hasPowder:fPowder,powderNote:fPowderNote,
    hasTopical:fTopical,topicalNote:fTopicalNote,
    r1:false,r2:false,prepSign:"",r3:false,giveSign:"",date:TODAY});
  selStuId=null;resetForm();save();render();
}
function mark(eid,f){var e=entries.find(function(x){return x.id===eid;});if(e){e[f]=true;save();render();}}
function unmark(eid,f){
  var e=entries.find(function(x){return x.id===eid;});if(!e)return;
  if(f==="r1"){e.r1=false;e.r2=false;e.prepSign="";e.r3=false;e.giveSign="";}
  else if(f==="r2"){e.r2=false;e.prepSign="";e.r3=false;e.giveSign="";}
  else{e.r3=false;e.giveSign="";}
  save();render();
}
function updSign(eid,f,v){var e=entries.find(function(x){return x.id===eid;});if(e){e[f]=v;LS.set("ent-"+TODAY,entries);}}
function delEntry(id){if(!confirm("確定刪除此筆？"))return;entries=entries.filter(function(e){return e.id!==id;});save();render();}
function clearAll(){if(!confirm("確定清除今日所有給藥記錄？"))return;entries=[];save();render();}

function calcCoursePreview(){
  var visit=document.getElementById("co-visit");
  var daysEl=document.getElementById("co-days");
  var prev=document.getElementById("co-preview");
  if(!visit||!daysEl||!prev)return;
  var vd=visit.value,days=parseInt(daysEl.value)||0;
  if(!vd||!days){prev.textContent="請填寫看診日期與天數";return;}
  var calc=calcCourse(vd,days);
  if(!calc.schoolDays.length){
    prev.innerHTML='<span style="color:#991B1B">⚠ 有效期間（'+rocDateStr(calc.start)+'～'+rocDateStr(calc.end)+'）內無上課日（全為假日或週末）</span>';
    return;
  }
  prev.innerHTML='<div style="color:#15803d;font-weight:500;margin-bottom:3px">在校給藥日期（共'+calc.schoolDays.length+'天）：</div>';
  calc.schoolDays.forEach(function(d){
    var isPast=d<TODAY,isT=d===TODAY;
    prev.innerHTML+='<span style="display:inline-block;padding:2px 8px;border-radius:10px;margin:2px;font-size:12px;background:'+(isT?'#EEF2FF':isPast?'#F3F4F6':'#E8F5EE')+';color:'+(isT?'#7C3AED':isPast?'#9CA3AF':'#15803d')+'">'+rocDateStr(d)+(isT?' ◀今天':isPast?' (已過)':'')+'</span>';
  });
}

function addCourse(){
  var sid=document.getElementById("co-stu").value;
  if(!sid){alert("請選擇幼兒");return;}
  var stu=students.find(function(s){return s.id===sid;});
  var selMedId=document.getElementById("co-med-sel").value;
  var medName="";
  if(selMedId==="custom"){medName=(document.getElementById("co-custom")||{value:""}).value.trim();}
  else if(selMedId){medName=(meds.find(function(m){return m.id===selMedId;})||{name:""}).name;}
  var powder=document.getElementById("co-powder").checked;
  var topical=document.getElementById("co-topical").checked;
  if(!medName&&!powder&&!topical){alert("請填寫藥品名稱或勾選藥粉/外用");return;}
  var slots=Array.prototype.slice.call(document.querySelectorAll(".co-slot:checked")).map(function(el){return el.value;});
  if(!slots.length){alert("請選擇給藥時間");return;}
  var visitDate=document.getElementById("co-visit").value;
  var days=parseInt(document.getElementById("co-days").value)||0;
  if(!visitDate){alert("請填寫看診日期");return;}
  if(!days||days<1){alert("請填寫醫囑天數");return;}
  var calc=calcCourse(visitDate,days);
  if(!calc.schoolDays.length&&!confirm("有效期間內無上課日，確定仍要儲存？"))return;
  courses.push({id:uid(),studentId:sid,studentName:stu.name,cls:stu.cls,
    medId:selMedId,medName:medName,dose:parseFloat(document.getElementById("co-dose").value)||0,
    unit:document.getElementById("co-unit").value,slots:slots,
    route:document.getElementById("co-route").value,
    hasPowder:powder,hasTopical:topical,
    cold:document.getElementById("co-cold").checked,
    visitDate:visitDate,days:days,givenDates:[],
    note:(document.getElementById("co-note")||{value:""}).value.trim()});
  save();
  var newCourse=courses[courses.length-1];
  render();
  // Prompt to print label
  setTimeout(function(){
    if(confirm("療程記錄已儲存！\n\n是否現在列印藥袋標籤？\n（列印後裁剪貼在藥袋上，每次給藥前掃描）")){
      printCourseLabel(newCourse.id);
    }
  },200);
}

function dedupStudents(){
  var seen={};
  var before=students.length;
  students=students.filter(function(s){
    var key=s.name.trim()+"|"+normCls(s.cls);
    if(seen[key])return false;
    seen[key]=true;return true;
  });
  var removed=before-students.length;
  save();render();
  alert("已移除 "+removed+" 筆重複學生");
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function importSB(){
  var url=(sbUrl||"").trim(),key=(sbKey||"").trim();
  var table=(sbTable||"students").trim(),nc=(sbNameCol||"name").trim(),cc=(sbClsCol||"class").trim();
  if(!url||!key){showSBMsg("請輸入 URL 與 API Key","info");return;}
  var btn=document.getElementById("sb-btn");if(btn){btn.textContent="匯入中...";btn.disabled=true;}
  try{
    var res=await fetch(url+"/rest/v1/"+table+"?select="+nc+","+cc,{
      headers:{"apikey":key,"Authorization":"Bearer "+key,"Content-Type":"application/json"}
    });
    if(!res.ok)throw new Error("HTTP "+res.status+": "+await res.text());
    var data=await res.json();
    var added=data.map(function(r){return{id:uid(),name:String(r[nc]||"").trim(),cls:normCls(String(r[cc]||"IC1"))};}).filter(function(x){return x.name;});
    if(!added.length){showSBMsg("查無學生資料","info");}
    else{students=students.concat(added);save();render();showSBMsg("✓ 成功匯入 "+added.length+" 位學生","ok");}
  }catch(err){showSBMsg("✗ 匯入失敗："+err.message,"err");}

// ── SCAN ──────────────────────────────────────────────────────────────────────
var scanTimer=null;
function handleScan(v){
  if(scanTimer)clearTimeout(scanTimer);
  scanTimer=setTimeout(function(){
    var val=v.trim();if(!val)return;
    // 藥袋 QR Code: COURSE:courseId
    if(val.indexOf("COURSE:")===0){
      var cid=val.slice(7);
      var c=courses.find(function(x){return x.id===cid;});
      if(!c){alert("找不到此療程，QR Code 可能已過期");return;}
      var st=courseStatus(c);
      if(st.expired){alert("此療程已結束（"+rocDateStr(st.end)+"）");return;}
      if(!isSchoolDay(TODAY)){alert("今天非上課日，無需給藥");return;}
      if(st.calc.schoolDays.indexOf(TODAY)<0){alert("今天不在此療程的給藥日內");return;}
      if(st.givenToday){alert("今天已給藥完成！");return;}
      // Auto-add to today and open confirm
      addCourseToday(cid);
      // find the entry just added and open confirm
      setTimeout(function(){
        var last=entries[entries.length-1];
        if(last)openConfirm(last.id);
      },100);
      return;
    }
    // 學生 QR Code: STU:id
    if(val.indexOf("STU:")===0){
      var id=val.slice(4);
      var s=students.find(function(x){return x.id===id;});
      if(s){selStuId=id;resetForm();render();}else alert("找不到此學生，請確認 QR Code");
      return;
    }
    // 文字搜尋
    var matches=students.filter(function(s){return s.name.indexOf(val)>=0;});
    if(matches.length===1){selStuId=matches[0].id;resetForm();render();}
    else if(matches.length>1){render();}
  },300);
}
function doScanEnter(){var el=document.getElementById("scan-input");if(el)handleScan(el.value);}
function clearScan(){var el=document.getElementById("scan-input");if(el)el.value="";selStuId=null;render();}

function genQRSvg(data,size){
  // Generate QR SVG and cache it
  size=size||90;
  if(qrCache[data])return qrCache[data];
  if(typeof QRCode==="undefined")return"";
  try{
    var q=new QRCode({content:data,padding:2,width:size,height:size,color:"#000000",background:"#ffffff",ecl:"M"});
    var svg=q.svg();
    qrCache[data]=svg;
    return svg;
  }catch(e){
    console.error("QR gen failed:",e);
    return"";
  }
}

function initQR(){
  if(typeof QRCode==="undefined"){console.warn("QRCode not loaded");return;}
  var filt=clsFilter==="全部"?students:students.filter(function(s){return s.cls===clsFilter;});
  filt.forEach(function(s){
    var el=document.getElementById("qr-"+s.id);
    if(!el)return;
    if(el.querySelector("svg"))return;
    var svg=genQRSvg("STU:"+s.id,60);
    if(svg)el.innerHTML=svg;
    else el.textContent="STU:"+s.id;
  });
}

function startCam(mode){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}
  }).then(function(stream){
    cameraStream = stream;
    var video = document.getElementById("cam-video");
    if(!video){closeCamera();return;}
    video.srcObject = stream;
    video.play().then(function(){
      var st = document.getElementById("cam-status");
      if(st) st.textContent = "相機已啟動，請對準 QR Code";
      if(mode === "detector") scanWithDetector(video);
      else if(mode === "canvas") scanWithCanvas(video);
      else {
        if(st) st.innerHTML = "此裝置不支援自動辨識<br>請確認 Safari 版本 ≥ 17 或改用 Chrome";
      }
    }).catch(function(e){
      var st = document.getElementById("cam-status");
      if(st) st.textContent = "相機啟動失敗："+e.message;
    });
  }).catch(function(err){
    var st = document.getElementById("cam-status");
    if(!st)return;
    if(err.name==="NotAllowedError") st.textContent="請允許使用相機（點瀏覽器網址列左側的鎖頭）";
    else st.textContent="無法啟動相機："+err.message;
  });
}

function scanWithDetector(video){
  try{
    camDetector = new BarcodeDetector({formats:["qr_code"]});
  }catch(e){ scanWithCanvas(video); return; }
  function tick(){
    if(!document.getElementById("cam-overlay"))return;
    if(video.readyState < 3){ cameraTimer=setTimeout(tick,200); return; }
    camDetector.detect(video).then(function(codes){
      if(codes.length > 0){ onCamResult(codes[0].rawValue); }
      else{ cameraTimer = setTimeout(tick, 150); }
    }).catch(function(e){
      // Safari sometimes needs canvas fallback
      scanWithCanvas(video);
    });
  }
  cameraTimer = setTimeout(tick, 300);
}

function scanWithCanvas(video){
  var canvas = document.getElementById("cam-canvas");
  if(!canvas){closeCamera();return;}
  var ctx = canvas.getContext("2d");
  if(typeof BarcodeDetector === "undefined"){ 
    var st=document.getElementById("cam-status");
    if(st) st.innerHTML="此裝置不支援自動辨識<br>請使用 <strong>Chrome</strong> 或 <strong>Safari 17+</strong>";
    return;
  }
  var det;
  try{ det = new BarcodeDetector({formats:["qr_code"]}); }catch(e){ return; }
  function tick(){
    if(!document.getElementById("cam-overlay"))return;
    if(video.readyState < 3){ cameraTimer=setTimeout(tick,200); return; }
    try{
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      // Use createImageBitmap on the canvas for Safari compatibility
      createImageBitmap(canvas).then(function(bmp){
        det.detect(bmp).then(function(codes){
          if(codes.length > 0){ onCamResult(codes[0].rawValue); }
          else{ cameraTimer = setTimeout(tick, 250); }
        }).catch(function(){ cameraTimer = setTimeout(tick, 250); });
      }).catch(function(){ cameraTimer = setTimeout(tick, 250); });
    }catch(e){ cameraTimer = setTimeout(tick, 250); }
  }
  cameraTimer = setTimeout(tick, 400);
}

function onCamResult(val){
  closeCamera();

  handleScan(val);
  // Visual feedback

  if(bar){
    bar.style.transition="background .3s";
    bar.style.background="#15803d";
    setTimeout(function(){bar.style.background="";},600);
  }
}

function closeCamera(){
  if(cameraStream){
    cameraStream.getTracks().forEach(function(t){t.stop();});
    cameraStream = null;
  }
  if(cameraAnimFrame){
    cancelAnimationFrame(cameraAnimFrame);
    clearTimeout(cameraAnimFrame);
    cameraAnimFrame = null;
  }
  var overlay = document.getElementById("cam-overlay");
  if(overlay)overlay.remove();
}

  var rows="";
  entries.forEach(function(e,i){
    var mn=e.medName||(e.hasPowder&&e.hasTopical?"藥粉+外用":e.hasPowder?"僅藥粉":e.hasTopical?"僅外用":"");
    var sl=e.slots.map(function(k){var s=SLOTS.find(function(x){return x.k===k;});return s?s.l:k;}).join("、");
    rows+="<tr class='"+(e.r1&&e.r2&&e.r3?"done":i%2?"odd":"")+"'>";
    rows+="<td>"+(i+1)+"</td><td>"+escH(e.studentName)+"</td><td>"+escH(e.cls)+"</td>";
    rows+="<td style='text-align:left'>"+escH(mn)+"</td><td>"+(e.medName?escH(e.dose+e.unit):"—")+"</td>";
    rows+="<td>"+escH(sl)+"</td><td>"+escH(e.route)+"</td>";
    rows+="<td>"+(e.r1?"✓":"")+"</td><td>"+(e.r2?"✓":"")+"</td><td>"+escH(e.prepSign||"")+"</td>";
    rows+="<td>"+(e.r3?"✓":"")+"</td><td>"+escH(e.giveSign||"")+"</td>";
    rows+="<td style='text-align:left;font-size:7pt'>"+(e.cold?"❄ ":"")+escH(e.note)+"</td></tr>";
  });
  for(var i=entries.length;i<Math.max(entries.length,8);i++){
    rows+="<tr class='"+(i%2?"odd":"")+"'><td>"+(i+1)+"</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>";
  }
  var w=window.open("","_blank");
  w.document.write("<!DOCTYPE html><html><head><meta charset='utf-8'><title>給藥核對清單</title>"
    +"<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Microsoft JhengHei',sans-serif;font-size:9.5pt;padding:10mm}"
    +"h2{text-align:center;font-size:14pt;margin-bottom:4pt;color:#1A4B7C}.meta{text-align:center;font-size:9pt;margin-bottom:7pt;color:#555}"
    +"table{width:100%;border-collapse:collapse}th{background:#1A4B7C;color:#fff;padding:4pt;font-size:8pt;text-align:center;border:1px solid #1A4B7C}"
    +"td{padding:4pt;font-size:8pt;border:1px solid #ccc;text-align:center;vertical-align:middle}"
    +".done{background:#E8F5EE}.odd{background:#f9f9f9}.footer{display:flex;justify-content:space-between;margin-top:6pt}"
    +".five{font-size:7.5pt;color:#666;margin-top:5pt;text-align:center}@media print{button{display:none}}</style></head><body>"
    +"<h2>臺北市廣慈托嬰中心　當日給藥核對清單</h2>"
    +"<div class='meta'>"+ROC_DATE+"　帶藥人數："+entries.length+"人</div>"
    +"<table><thead><tr><th style='width:20pt'>序</th><th>幼兒姓名</th><th>班別</th><th>藥品名稱</th><th>劑量</th><th>時間</th><th>途徑</th>"
    +"<th style='width:48pt'>第一讀</th><th style='width:48pt'>第二讀</th><th style='width:68pt'>備藥護理師</th>"
    +"<th style='width:48pt'>第三讀</th><th style='width:68pt'>餵藥護理師</th><th>備註</th>"
    +"</tr></thead><tbody>"+rows+"</tbody></table>"
    +"<div class='footer'><span>護理師：＿＿＿＿＿＿＿</span><span>主任核閱：＿＿＿＿＿＿＿</span></div>"
    +"<p class='five'>【五對】① 對人名 ② 對藥物 ③ 對劑量 ④ 對時間 ⑤ 對途徑　｜　第二讀備藥時需雙人核對</p>"
    +"<br><button onclick='window.print()' style='padding:6px 18px;cursor:pointer;background:#1A4B7C;color:#fff;border:none;border-radius:4px'>列印</button>"
    +"</body></html>");
  w.document.close();w.focus();
}
